# Supabase local/project config. `project_id` is set per environment by the CLI
# during `supabase link`; this file is the baseline for `supabase start` locally.
project_id = "supabase-cicd-starter"

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
# For the demo we allow email signup without confirmation so reviewers can try it fast.
[auth.email]
enable_signup = true
enable_confirmations = false

[realtime]
enabled = true
