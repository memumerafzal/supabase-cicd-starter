name: Rollback — Production

# Manual rollback: re-point the :prod and :latest tags at a previously-built,
# known-good image tag (e.g. v1.2.0) without rebuilding. Because every release
# pushes an immutable version-tagged image, rollback is just a re-tag — fast
# and deterministic. DB rollbacks are handled separately (see docs/deployment.md).
on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'Known-good image tag to roll back to (e.g. v1.2.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production    # approval gate applies to rollbacks too
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag target image as prod + latest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker buildx imagetools create \
            --tag "$IMAGE:prod" \
            --tag "$IMAGE:latest" \
            "$IMAGE:${{ inputs.target_tag }}"

      - name: Summary
        run: echo "### ⏪ Rolled back production to ${{ inputs.target_tag }}" >> "$GITHUB_STEP_SUMMARY"
