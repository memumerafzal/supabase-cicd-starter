name: CI

# Runs on every PR and push. Gate that must pass before merge.
on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders; real values come from environments on deploy.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-key

  e2e:
    name: Playwright E2E (local Supabase)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: npm ci

      - name: Start local Supabase
        run: supabase start

      - name: Resolve local Supabase credentials
        id: sb
        run: |
          echo "url=$(supabase status -o env | grep API_URL | cut -d= -f2 | tr -d '\"')" >> "$GITHUB_OUTPUT"
          echo "anon=$(supabase status -o env | grep ANON_KEY | cut -d= -f2 | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Build with local Supabase env
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ steps.sb.outputs.url }}
          VITE_SUPABASE_ANON_KEY: ${{ steps.sb.outputs.anon }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
